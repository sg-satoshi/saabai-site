# Vercel Deployment Verification
# Runs after every push to main and polls the Vercel API until the deployment
# reaches "Ready" or "Error" state. Fails the check if the build errors.
#
# Required GitHub repository secret:
#   VERCEL_ACCESS_TOKEN — Vercel API token (create at vercel.com/account/tokens)
#
# Optional GitHub repository secrets (only needed if different from defaults):
#   VERCEL_PROJECT_ID  — project ID from Vercel project settings
#   VERCEL_TEAM_ID     — team ID from Vercel team settings
#
# To set these: https://github.com/sg-satoshi/saabai-site/settings/secrets/actions

name: Vercel Deploy Check

on:
  push:
    branches: [main]

jobs:
  verify-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Poll Vercel for deployment status
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
        run: |
          # Project and team IDs — use repo secrets if set, otherwise defaults
          PROJECT_ID="${VERCEL_PROJECT_ID:-prj_1p5i2LakOMkQJaSDAYd8Y1N3k3Ci}"
          TEAM_ID="${VERCEL_TEAM_ID:-team_wJsriYxqNXFGvqb3vyolvWJT}"

          echo "Polling Vercel for latest deployment..."
          echo "Project: ${PROJECT_ID}"
          echo "Team: ${TEAM_ID}"

          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_ACCESS_TOKEN secret is not set."
            echo "Create one at https://vercel.com/account/tokens"
            echo "Then add it at: https://github.com/sg-satoshi/saabai-site/settings/secrets/actions"
            exit 1
          fi

          for i in $(seq 1 24); do
            RESPONSE=$(curl -s \
              "https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${TEAM_ID}&limit=1&target=production" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}")

            # Parse deployment status: state|url|sha
            DEPLOY_STATUS=$(echo "$RESPONSE" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    deploys = d.get('deployments', [])
    if deploys:
        dep = deploys[0]
        state = dep.get('state', 'UNKNOWN')
        url = dep.get('url', 'n/a')
        sha = dep.get('meta', {}).get('githubCommitSha', '')[:8]
        print(f'{state}|{url}|{sha}')
    else:
        print('NO_DEPLOYMENTS|')
except Exception as e:
    print(f'ERROR|{e}')
" 2>/dev/null)

            STATE=$(echo "$DEPLOY_STATUS" | cut -d'|' -f1)
            URL=$(echo "$DEPLOY_STATUS" | cut -d'|' -f2)
            SHA=$(echo "$DEPLOY_STATUS" | cut -d'|' -f3)
            GIT_SHA="${GITHUB_SHA:0:8}"

            echo "Attempt $i: State=$STATE URL=$URL Commit=$SHA"

            if [ "$STATE" = "READY" ]; then
              if [ -n "$SHA" ] && [ "$SHA" != "$GIT_SHA" ]; then
                echo "Deployment exists but commit $SHA does not match current $GIT_SHA yet"
                sleep 15
                continue
              fi
              echo "DEPLOYMENT READY: https://$URL"
              exit 0
            fi

            if [ "$STATE" = "ERROR" ]; then
              echo "::error::DEPLOYMENT FAILED: https://$URL"
              echo "Check build logs: vercel logs $URL"
              exit 1
            fi

            if [ "$STATE" = "CANCELED" ]; then
              echo "::warning::Deployment was cancelled"
              exit 0
            fi

            sleep 15
          done

          echo "::error::Timed out waiting for deployment (last state: $STATE)"
          echo "Check manually at: https://vercel.com/shanegoldbergs-projects/saabai-site"
          exit 1
